# Local Spark Standalone + Livy + MySQL for CMDBCompare integration tests.
# Usage: docker compose up -d

services:
  spark-master:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-master
    hostname: spark-master
    # 强制使用 root 避免权限问题
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "18080:8080"
      - "17077:7077"
    volumes:
      - ./data:/data
    networks:
      - spark-network

  spark-worker-1:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-worker-1
    # 关键：解决 java.nio.file.AccessDeniedException: /opt/spark/work
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=2G
    volumes:
      - ./data:/data
      # 也可以通过挂载匿名卷来解决 work 目录权限问题
      - spark-worker-1-work:/opt/spark/work
    depends_on:
      - spark-master
    networks:
      - spark-network

  spark-worker-2:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-worker-2
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_CORES=1
      - SPARK_WORKER_MEMORY=2G
    volumes:
      - ./data:/data
      - spark-worker-2-work:/opt/spark/work
    depends_on:
      - spark-master
    networks:
      - spark-network

  livy:
    build:
      context: ./livy
      dockerfile: Dockerfile
    image: cmdb-compare-livy:local
    container_name: livy-server
    # 确保 Livy 有权限创建 /opt/livy/logs
    user: root
    ports:
      - "8998:8998"
    environment:
      # 告诉 Livy 去哪里找 Spark Master
      - LIVY_SERVER_SESSION_FACTORY=process
      - SPARK_MASTER=spark://spark-master:7077

    volumes:
      - ./data:/data
    depends_on:
      - spark-master
    networks:
      - spark-network

networks:
  spark-network:
    driver: bridge

volumes:
  # 为 worker 定义持久化/自动创建的工作目录卷
  spark-worker-1-work:
  spark-worker-2-work:
  mysql_data:
